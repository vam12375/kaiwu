<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市场调研报告 · 曜势科技</title>
<style>
  :root {
    --accent: #E87040;
    --accent-light: #F5D5C8;
    --bg: #FAFAF8;
    --text: #1a1a1a;
    --text-secondary: #666;
    --text-muted: #999;
    --border: #e8e8e6;
    --card: #fff;
    --table-stripe: #f8f6f4;
    --chapter-bg: #FDF8F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.8; -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── Deck container (horizontal scroll) ─── */
  #deck {
    display: flex; width: 10000vw; height: 100vh;
    transition: transform .8s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  .slide {
    width: 100vw; height: 100vh; flex: 0 0 100vw;
    overflow-y: auto; overflow-x: hidden;
    padding: 0;
    background: var(--bg);
  }

  /* ─── Cover ─── */
  .slide-cover {
    background: linear-gradient(135deg, #E87040 0%, #D4532A 40%, #C0392B 100%);
    color: #fff; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    padding: 80px 60px;
  }
  .slide-cover .cover-tag {
    font-size: 14px; letter-spacing: .3em; text-transform: uppercase;
    opacity: .8; margin-bottom: 24px;
  }
  .slide-cover h1 {
    font-size: min(5vw, 48px); font-weight: 700;
    line-height: 1.3; margin-bottom: 16px; max-width: 800px;
  }
  .slide-cover .cover-sub {
    font-size: 16px; opacity: .75; max-width: 500px;
    margin-bottom: 40px;
  }
  .slide-cover .cover-meta {
    font-size: 13px; opacity: .5;
    position: absolute; bottom: 40px;
  }

  /* ─── Chapter divider ─── */
  .slide-chapter {
    background: var(--chapter-bg);
    display: flex; flex-direction: column;
    justify-content: center; padding: 80px 80px;
  }
  .slide-chapter .ch-num {
    font-size: 14px; letter-spacing: .2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .slide-chapter h2 {
    font-size: min(4vw, 36px); font-weight: 700;
    color: var(--text); margin-bottom: 16px;
  }
  .slide-chapter .ch-desc {
    font-size: 15px; color: var(--text-secondary); max-width: 500px;
    line-height: 1.8;
  }

  /* ─── Content slide ─── */
  .slide-content {
    padding: 60px 80px;
    display: flex; flex-direction: column;
  }
  .slide-content .page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px; padding-bottom: 12px;
    border-bottom: 2px solid var(--accent);
  }
  .page-header .ph-title { font-size: 13px; color: var(--text-muted); }
  .page-header .ph-num { font-size: 12px; color: var(--text-muted); }
  .slide-content h3 {
    font-size: min(2.5vw, 24px); font-weight: 700;
    margin-bottom: 24px; color: var(--text);
  }
  .slide-content h4 {
    font-size: 16px; font-weight: 600; color: var(--accent);
    margin: 20px 0 10px;
  }
  .slide-content p {
    font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;
    line-height: 1.9;
  }
  .slide-content ul {
    list-style: none; padding: 0;
  }
  .slide-content li {
    font-size: 14px; color: var(--text-secondary);
    padding: 6px 0; position: relative; padding-left: 20px;
  }
  .slide-content li::before {
    content: "●"; color: var(--accent); font-size: 8px;
    position: absolute; left: 0; top: 10px;
  }

  /* ─── Data table ─── */
  .data-table {
    width: 100%; border-collapse: collapse; margin: 16px 0;
    font-size: 13px;
  }
  .data-table th {
    background: var(--accent); color: #fff;
    padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px;
  }
  .data-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .data-table tr:nth-child(even) td { background: var(--table-stripe); }

  /* ─── KPI row ─── */
  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin: 20px 0;
  }
  .kpi-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; text-align: center;
  }
  .kpi-card .kpi-value {
    font-size: 32px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px;
  }
  .kpi-card .kpi-label {
    font-size: 12px; color: var(--text-muted);
  }

  /* ─── Source ─── */
  .source {
    margin-top: auto; padding-top: 16px;
    font-size: 11px; color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  /* ─── Two column ─── */
  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
  }

  /* ─── Navigation ─── */
  #nav {
    position: fixed; bottom: 20px; right: 24px; z-index: 100;
    display: flex; gap: 8px;
  }
  #nav button {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid #ddd; background: #fff;
    cursor: pointer; font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    transition: all .2s;
  }
  #nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  #nav .page-indicator {
    display: flex; align-items: center; padding: 0 12px;
    font-size: 13px; color: var(--text-muted);
  }
</style>
</head>
<body>

<div id="deck">
<!-- SLIDES_HERE -->
</div>

<div id="nav">
  <button onclick="go(0)" title="首页">⟪</button>
  <button onclick="go(idx-1)" title="上一页">←</button>
  <span class="page-indicator" id="page-indicator">1 / 1</span>
  <button onclick="go(idx+1)" title="下一页">→</button>
  <button onclick="go(total-1)" title="末页">⟫</button>
</div>

<script>
const deck = document.getElementById('deck');
const slides = deck.querySelectorAll('.slide');
const total = slides.length;
let idx = 0;

function go(n) {
  if (n < 0 || n >= total) return;
  idx = n;
  deck.style.transform = `translateX(-${idx * 100}vw)`;
  document.getElementById('page-indicator').textContent = `${idx + 1} / ${total}`;
}

addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
    e.preventDefault(); go(idx + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault(); go(idx - 1);
  } else if (e.key === 'Home') { e.preventDefault(); go(0); }
  else if (e.key === 'End') { e.preventDefault(); go(total - 1); }
});

let wheelAcc = 0, wheelTO;
addEventListener('wheel', e => {
  wheelAcc += e.deltaY;
  if (Math.abs(wheelAcc) > 60) {
    go(idx + (wheelAcc > 0 ? 1 : -1));
    wheelAcc = 0;
  }
  clearTimeout(wheelTO);
  wheelTO = setTimeout(() => wheelAcc = 0, 200);
}, { passive: true });

let tx = 0;
addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(idx + (dx < 0 ? 1 : -1));
});

go(0);
total > 0 && (document.getElementById('page-indicator').textContent = `1 / ${total}`);
</script>
</body>
</html>
